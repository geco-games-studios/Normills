{% if product.visible_trust_badges %}
<div class="{{ wrapper_class|default:'mt-3 flex flex-wrap gap-2' }}">
    {% for badge in product.visible_trust_badges %}
    <span class="inline-flex items-center border px-2 py-1 text-[10px] font-black uppercase tracking-[.12em] {{ badge.classes }}">{{ badge.label }}</span>
    {% endfor %}
</div>
{% endif %}
