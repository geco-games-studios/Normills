<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Normils{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: .03em;
        }

        body.menu-open {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .normils-wordmark {
            font-weight: 900;
            letter-spacing: -.08em;
            text-transform: lowercase;
        }

        .product-title {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            overflow: hidden;
        }

        .image-tile {
            aspect-ratio: 3 / 4;
        }

        .range-track {
            background: linear-gradient(90deg, #1686b9 0 2%, #e7e7e7 2% 100%);
        }

        .scrollbar-none {
            scrollbar-width: none;
        }

        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen bg-white text-[#2d2d33] antialiased">
    <header class="sticky top-0 z-50 bg-[#2b2b2b] text-white">
        <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-5">
            <button id="nav-toggle" class="flex h-10 w-10 items-center justify-center text-white md:hidden" aria-label="Open menu">
                <svg id="menu-icon-open" class="h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round" />
                </svg>
                <svg id="menu-icon-close" class="hidden h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round" />
                </svg>
            </button>

            <a href="/" class="normils-wordmark text-3xl leading-none">normils</a>

            <nav class="hidden items-center gap-8 text-sm font-bold uppercase tracking-[.18em] md:flex">
                <a href="/" class="hover:text-gray-200">New In</a>
                <a href="/search/?q=dress" class="hover:text-gray-200">Women</a>
                <a href="/search/?q=shoes" class="hover:text-gray-200">Shoes</a>
                <a href="/search/?q=accessories" class="hover:text-gray-200">Accessories</a>
            </nav>

            <div class="flex items-center gap-5">
                <form action="/search/" method="get" class="hidden w-64 md:block">
                    <label class="relative block">
                        <span class="sr-only">Search</span>
                        <input type="text" name="q" placeholder="Search products" class="w-full border-0 bg-white px-4 py-2 pr-10 text-sm text-gray-900 outline-none focus:ring-2 focus:ring-white" />
                        <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-900" aria-label="Search">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="7"></circle>
                                <path d="m20 20-3.5-3.5" stroke-linecap="round"></path>
                            </svg>
                        </button>
                    </label>
                </form>
                <a href="/search/" class="md:hidden" aria-label="Search">
                    <svg class="h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="7"></circle>
                        <path d="m20 20-3.5-3.5" stroke-linecap="round"></path>
                    </svg>
                </a>
                <a href="{% if user.is_authenticated %}{% url 'profile' %}{% else %}{% url 'login' %}{% endif %}" aria-label="Account">
                    <svg class="h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <circle cx="12" cy="8" r="4"></circle>
                        <path d="M4 21c1.8-4.2 5-6 8-6s6.2 1.8 8 6" stroke-linecap="round"></path>
                    </svg>
                </a>
                <a href="/cart/" class="relative" aria-label="Cart">
                    <svg class="h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M6 7h12l-1 14H7L6 7Z"></path>
                        <path d="M9 7a3 3 0 0 1 6 0" stroke-linecap="round"></path>
                    </svg>
                    <span id="desktop-cart-badge" class="absolute -right-2 -top-2 hidden min-w-5 rounded-full bg-white px-1 text-center text-xs font-bold text-black">0</span>
                </a>
            </div>
        </div>
    </header>

    {% if messages %}
    <div class="mx-auto max-w-7xl px-4 py-4">
        <div class="space-y-3">
            {% for message in messages %}
            <div class="border px-4 py-3 text-sm {% if message.level_tag == 'error' %}border-red-200 bg-red-50 text-red-800{% elif message.level_tag == 'success' %}border-green-200 bg-green-50 text-green-800{% else %}border-gray-200 bg-gray-50 text-gray-800{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <div id="mobile-menu-overlay" class="fixed inset-0 z-[90] hidden bg-black/50"></div>
    <aside id="mobile-menu-panel" class="fixed left-0 top-0 z-[100] h-full w-80 max-w-[85vw] -translate-x-full bg-white text-black shadow-2xl transition-transform duration-300">
        <div class="flex h-16 items-center justify-between border-b border-gray-200 px-5">
            <span class="normils-wordmark text-3xl">normils</span>
            <button id="close-mobile-menu" class="h-10 w-10 text-3xl leading-none" aria-label="Close menu">&times;</button>
        </div>
        <form action="/search/" method="get" class="border-b border-gray-200 p-5">
            <input type="text" name="q" placeholder="Search products" class="w-full border border-gray-300 px-4 py-3 text-base outline-none focus:border-black" />
        </form>
        <nav class="flex flex-col text-base font-bold uppercase tracking-[.14em]">
            <a href="/" class="border-b border-gray-200 px-5 py-5">New In</a>
            <a href="/search/?q=dress" class="border-b border-gray-200 px-5 py-5">Women</a>
            <a href="/search/?q=shoes" class="border-b border-gray-200 px-5 py-5">Shoes</a>
            <a href="/wishlist/" class="border-b border-gray-200 px-5 py-5">Wishlist</a>
            <a href="/cart/" class="border-b border-gray-200 px-5 py-5">Bag</a>
        </nav>
    </aside>

    <main class="relative z-10">
        {% block content %}{% endblock %}
    </main>

    {% block footer %}{% endblock %}

    <script>
        (function() {
            const menuToggle = document.getElementById('nav-toggle');
            const menuPanel = document.getElementById('mobile-menu-panel');
            const overlay = document.getElementById('mobile-menu-overlay');
            const closeBtn = document.getElementById('close-mobile-menu');
            const body = document.body;
            const openIcon = document.getElementById('menu-icon-open');
            const closeIcon = document.getElementById('menu-icon-close');

            function openMenu() {
                if (!menuPanel || !overlay) return;
                menuPanel.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                body.classList.add('menu-open');
                openIcon?.classList.add('hidden');
                closeIcon?.classList.remove('hidden');
            }

            function closeMenu() {
                if (!menuPanel || !overlay) return;
                menuPanel.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                body.classList.remove('menu-open');
                openIcon?.classList.remove('hidden');
                closeIcon?.classList.add('hidden');
            }

            menuToggle?.addEventListener('click', function() {
                if (menuPanel.classList.contains('-translate-x-full')) {
                    openMenu();
                } else {
                    closeMenu();
                }
            });
            closeBtn?.addEventListener('click', closeMenu);
            overlay?.addEventListener('click', closeMenu);

            const cartCount = {{ cart.item_count|default:0 }};
            const cartBadge = document.getElementById('desktop-cart-badge');
            if (cartBadge && cartCount > 0) {
                cartBadge.textContent = cartCount;
                cartBadge.classList.remove('hidden');
            }

            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }

            function setWishlistButtonState(button, active) {
                button.classList.toggle('wish-active', active);
                button.setAttribute('aria-pressed', active ? 'true' : 'false');
                const svg = button.querySelector('svg');
                svg?.classList.toggle('fill-black', active);
                svg?.classList.toggle('fill-none', !active);
            }

            document.addEventListener('click', function(e) {
                const btn = e.target.closest && e.target.closest('.wishlist-toggle');
                if (!btn) return;
                e.preventDefault();
                const productId = btn.dataset.productId;
                if (!productId) return;
                const isActive = btn.classList.contains('wish-active');
                const url = isActive ? '{% url "remove_from_wishlist" %}' : '{% url "add_to_wishlist" %}';

                fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                    },
                    body: JSON.stringify({product_id: productId})
                }).then(r => r.json()).then(data => {
                    if (!data || !data.success) return;
                    const shouldBeActive = Boolean(data.added || (data.added === undefined && !data.removed));
                    document.querySelectorAll(`.wishlist-toggle[data-product-id="${productId}"]`).forEach((button) => {
                        setWishlistButtonState(button, shouldBeActive);
                    });
                }).catch(err => console.error('Wishlist error', err));
            });
        })();
    </script>
</body>
</html>
