{% extends 'base.html' %}

{% block title %}Verify Phone - Marketplace{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-4 text-center">Verify your phone</h1>
    <div class="bg-white rounded-lg shadow-sm p-6">
        <p class="text-sm text-gray-700 mb-4">We sent a verification code to your phone. Enter it below to activate your account.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_code" class="block text-sm font-medium text-gray-700 mb-1">Verification Code</label>
                <input type="text" name="code" id="id_code" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <button type="submit" class="w-full bg-indigo-600 text-white px-4 py-3 rounded-md font-medium hover:bg-indigo-700">Verify</button>
            </div>
        </form>
        <form method="post" action="{% url 'resend_otp' %}" class="mt-4">
            {% csrf_token %}
            <button type="submit" class="w-full bg-gray-200 text-gray-900 px-4 py-3 rounded-md font-medium hover:bg-gray-300">Resend verification code</button>
        </form>
    </div>
</div>
{% endblock %}
