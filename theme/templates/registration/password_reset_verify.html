{% extends 'base.html' %}

{% block title %}Verify Reset Code - Marketplace{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-center">Verify Reset Code</h1>
    <div class="bg-white rounded-lg shadow-sm p-6">
        <p class="text-sm text-gray-700 mb-4">Enter the code we sent to your email or phone to continue resetting your password.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_code" class="block text-sm font-medium text-gray-700 mb-1">Reset Code</label>
                <input type="text" name="code" id="id_code" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter reset code">
            </div>
            <div>
                <button type="submit" class="w-full bg-indigo-600 text-white px-4 py-3 rounded-md font-medium hover:bg-indigo-700">Verify Code</button>
            </div>
        </form>
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                Didn’t receive a code? <a href="{% url 'password_reset_request' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Request another</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
