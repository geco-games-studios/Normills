{% extends 'base.html' %}

{% block title %}Forgot Password - Marketplace{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-center">Forgot Password</h1>
    <div class="bg-white rounded-lg shadow-sm p-6">
        <p class="text-sm text-gray-700 mb-4">Enter your email address or phone number and we'll send you a code to reset your password.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_identifier" class="block text-sm font-medium text-gray-700 mb-1">Email or Phone Number</label>
                <input type="text" name="identifier" id="id_identifier" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Email or phone number">
            </div>
            <div>
                <button type="submit" class="w-full bg-indigo-600 text-white px-4 py-3 rounded-md font-medium hover:bg-indigo-700">Send Reset Code</button>
            </div>
        </form>
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                Remembered your password? <a href="{% url 'login' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
